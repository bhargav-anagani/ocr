name: ocr_app
description: A professional OCR application for Android and Web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # HTTP client
  dio: ^5.4.3+1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # File picker
  file_picker: ^8.0.3

  # Camera (for mobile OCR capture)
  camera: ^0.10.5+9

  # Image
  image_picker: ^1.1.2

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.13.1

  # Icons and fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
